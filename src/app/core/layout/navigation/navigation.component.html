<nav class="navigation" [attr.aria-label]="'nav.aria' | t">
  <mat-nav-list>
    @for (item of navItems(); track item.path) {
      <a
        mat-list-item
        class="navigation__link"
        [routerLink]="item.path"
        routerLinkActive="navigation__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ item.labelKey | t }}
      </a>
    }
  </mat-nav-list>
</nav>
